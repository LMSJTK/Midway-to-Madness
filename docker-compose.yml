version: '3.8'

services:
  # The Vite React Frontend
  frontend:
    build: .
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules # Prevents host OS node_modules from overwriting container's
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DISABLE_HMR=false
      - API_URL=http://backend:3001
    depends_on:
      - backend

  # The Express Asset Engine Backend
  backend:
    build: .
    command: npm run editor:server
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REMBG_URL=http://rembg:5000
    depends_on:
      rembg:
        condition: service_healthy

  # Background removal service — wraps rembg in a Flask HTTP server
  rembg:
    build: ./rembg
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s